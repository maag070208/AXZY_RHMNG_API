openapi: 3.0.3

info:
  title: RHMG RECRUITMENT API
  description: API para gestión de recursos humanos y reclutamiento (Vacantes, Solicitantes, Entrevistas).
  version: 2.0.0

servers:
  - url: http://localhost:4444/api/v1
    description: Local server

tags:
  - name: users
    description: Gestión de usuarios y roles
  - name: vacancies
    description: Gestión de vacantes de empleo
  - name: applicants
    description: Control de aplicantes y postulaciones
  - name: interviews
    description: Programación y gestión de entrevistas
  - name: uploads
    description: Carga de documentos y expedientes

paths:
  ###########################################################################
  # USERS
  ###########################################################################
  /users/login:
    post:
      tags: [users]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TResultLogin'

  /users:
    get:
      tags: [users]
      summary: Obtener todos los usuarios
      responses:
         "200":
           description: OK
    post:
       tags: [users]
       summary: Registrar nuevo usuario
       requestBody:
         required: true
         content:
           application/json:
             schema:
                type: object
                required: [name, email, password, role]
                properties:
                   name: { type: string }
                   lastName: { type: string }
                   email: { type: string }
                   password: { type: string }
                   role: { type: string, enum: [ADMIN, RECURSOS_HUMANOS, RECLUTADOR] }
       responses:
          "201":
             description: Creado

  ###########################################################################
  # VACANCIES
  ###########################################################################
  /vacancies:
    get:
      tags: [vacancies]
      summary: Listar todas las vacantes
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [DRAFT, ACTIVE, PAUSED, CLOSED, CANCELLED]
      responses:
         "200":
           description: OK
    post:
      tags: [vacancies]
      summary: Crear nueva vacante
      requestBody:
         required: true
         content:
           application/json:
              schema:
                 type: object
                 required: [title]
                 properties:
                    title: { type: string }
                    description: { type: string }
                    department: { type: string }
                    salary: { type: number }
                    positions: { type: integer, default: 1 }
      responses:
         "201":
           description: Vacante creada (incluye qrToken)

  /vacancies/{id}:
    get:
       tags: [vacancies]
       summary: Obtener vacante por ID
       parameters:
         - in: path
           name: id
           required: true
           schema: { type: integer }
       responses:
          "200":
             description: OK
    put:
       tags: [vacancies]
       summary: Actualizar vacante
       parameters:
         - in: path
           name: id
           required: true
           schema: { type: integer }
       requestBody:
          required: true
          content:
            application/json:
               schema:
                  type: object
                  properties:
                     title: { type: string }
                     description: { type: string }
                     department: { type: string }
                     salary: { type: number }
                     positions: { type: integer }
                     status: { type: string, enum: [DRAFT, ACTIVE, PAUSED, CLOSED, CANCELLED] }
       responses:
          "200":
             description: Vacante actualizada

  ###########################################################################
  # APPLICANTS
  ###########################################################################
  /applicants/apply/{qrToken}:
     post:
        tags: [applicants]
        summary: Aplicar a una vacante vía código QR Público
        parameters:
          - in: path
            name: qrToken
            required: true
            schema: { type: string }
        requestBody:
           required: true
           content:
             application/json:
                schema:
                   type: object
                   required: [firstName, lastName]
                   properties:
                      firstName: { type: string }
                      lastName: { type: string }
                      email: { type: string }
                      phone: { type: string }
                      birthDate: { type: string, format: date-time }
                      experience: { type: string }
                      education: { type: string }
                      formData: { type: object }
        responses:
           "201":
              description: Aplicación recibida

  /applicants:
     get:
        tags: [applicants]
        summary: Listar aplicantes (opcional por vacancyId)
        parameters:
          - in: query
            name: vacancyId
            schema: { type: integer }
        responses:
           "200":
              description: OK
  
  /applicants/{id}:
     get:
        tags: [applicants]
        summary: Ver detalle de aplicante
        parameters:
          - in: path
            name: id
            required: true
            schema: { type: integer }
        responses:
           "200":
              description: OK
     put:
        tags: [applicants]
        summary: Actualizar estado de aplicante o datos
        parameters:
          - in: path
            name: id
            required: true
            schema: { type: integer }
        requestBody:
           required: true
           content:
              application/json:
                 schema:
                    type: object
                    properties:
                       status: { type: string, enum: [REGISTERED, FORM_COMPLETED, INTERVIEW_SCHEDULED, INTERVIEWED, HIRED, REJECTED] }
                       notes: { type: string }
        responses:
           "200":
              description: Actualizado

  ###########################################################################
  # INTERVIEWS
  ###########################################################################
  /interviews:
     get:
        tags: [interviews]
        summary: Listar de entrevistas
        parameters:
          - in: query
            name: vacancyId
            schema: { type: integer }
          - in: query
            name: applicantId
            schema: { type: integer }
        responses:
           "200":
              description: OK
     post:
        tags: [interviews]
        summary: Agendar entrevista
        requestBody:
           required: true
           content:
              application/json:
                 schema:
                    type: object
                    required: [scheduledAt, vacancyId, applicantId]
                    properties:
                       scheduledAt: { type: string, format: date-time }
                       vacancyId: { type: integer }
                       applicantId: { type: integer }
                       interviewerId: { type: integer }
                       notes: { type: string }
        responses:
           "201":
              description: Entrevista agendada

  /interviews/{id}:
     get:
        tags: [interviews]
        summary: Ver detalle de entrevista
        parameters:
          - in: path
            name: id
            required: true
            schema: { type: integer }
        responses:
           "200":
              description: OK
     put:
        tags: [interviews]
        summary: Actualizar entrevista
        parameters:
          - in: path
            name: id
            required: true
            schema: { type: integer }
        requestBody:
           required: true
           content:
              application/json:
                 schema:
                    type: object
                    properties:
                       scheduledAt: { type: string, format: date-time }
                       interviewerId: { type: integer }
                       notes: { type: string }
                       status: { type: string, enum: [SCHEDULED, COMPLETED, CANCELLED, NO_SHOW] }
        responses:
           "200":
              description: Actualizado

  ###########################################################################
  # UPLOADS
  ###########################################################################
  /uploads:
    post:
      tags: [uploads]
      summary: Subir documento (CV, INE, etc.)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object

components:
  schemas:
    TResultLogin:
      type: object
      properties:
        data: { type: string, description: JWT generado }
        error: { type: string, nullable: true }